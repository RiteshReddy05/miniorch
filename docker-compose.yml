services:
  postgres:
    image: postgres:16-alpine
    container_name: miniorch-postgres
    environment:
      POSTGRES_DB: miniorch
      POSTGRES_USER: miniorch
      POSTGRES_PASSWORD: miniorch_dev
    ports:
      - "5432:5432"
    volumes:
      - miniorch_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U miniorch -d miniorch"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  miniorch_pgdata:
